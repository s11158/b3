<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>b3.gg</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 30%, #1a1a2e, #0d0d18);
      color: #f5f5f7;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 520px; }
    h1 {
      font-size: clamp(64px, 18vw, 140px);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #7c5cff, #29d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.25;
      padding-bottom: 0.12em;
    }
    p { margin-top: 16px; font-size: 18px; opacity: 0.7; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#29d0ff; margin-right:8px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>b3.gg</h1>
    <p><span class="dot"></span>Скоро здесь будет проект</p>
  </div>
</body>
</html>
